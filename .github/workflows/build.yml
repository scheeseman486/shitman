name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            artifact: shitman-linux-x64
          - os: ubuntu-24.04-arm
            arch: arm64
            artifact: shitman-linux-arm64
          - os: windows-latest
            arch: x64
            artifact: shitman-windows-x64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.artifact }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Stamp version from tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER="$(git describe --tags --always 2>/dev/null || echo dev)"
          fi
          sed -i "s/^VERSION = .*/VERSION = '${VER}'/" shitman.py
          echo "VERSION=${VER}" >> "$GITHUB_ENV"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --clean --name shitman --strip shitman.py

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: ren dist\shitman.exe shitman-windows-x64.exe
        shell: cmd

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: mv dist/shitman dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
